<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Ultimate Racer Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:#111;color:white;text-align:center;overflow:hidden;}
header{background:#222;color:#0f0;padding:15px;font-size:28px;text-shadow:1px 1px 2px black;}
#gameContainer{margin:20px auto;position:relative;width:420px;}
canvas{background:#111;display:block;margin:auto;border-radius:12px;border:2px solid #444;}
#ui{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.6);padding:10px;border-radius:10px;font-size:14px;text-align:left;}
#restart{position:absolute;top:10px;right:10px;padding:8px 14px;border:none;border-radius:8px;background:#444;color:white;cursor:pointer;}
#mobileControls{position:absolute;bottom:20px;width:100%;display:none;justify-content:center;gap:25px;}
.ctrl{font-size:26px;padding:18px 28px;border:none;border-radius:12px;background:#444;color:white;cursor:pointer;}
@media (pointer:coarse){#mobileControls{display:flex;}}
</style>
</head>
<body>

<header>Ultimate Racer 🏎️</header>

<div id="gameContainer">
 <canvas id="game" width="420" height="640"></canvas>
 <div id="ui">
   Score: <span id="score">0</span><br>
   Level: <span id="level">1</span><br>
   Speed: <span id="speed">0</span><br>
   Nitro: <span id="nitro">100</span>
 </div>
 <button id="restart" onclick="location.reload()">Restart</button>
 <div id="mobileControls">
   <button class="ctrl" onclick="moveLeft()">⬅️</button>
   <button class="ctrl" onclick="moveRight()">➡️</button>
   <button class="ctrl" onclick="useNitro()">⚡</button>
 </div>
</div>

<script>
// --- Variabelen ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player={x:190,y:520,w:40,h:70,dx:0};
let enemies=[],police=[],road=[];
let score=0,level=1,speed=4,nitro=100,maxNitro=100,gameOver=false;
let rainDrops=[];

// Weglijnen
for(let i=0;i<12;i++){road.push({x:205,y:i*60});}

// Regen effect
for(let i=0;i<200;i++){
 rainDrops.push({x:Math.random()*420,y:Math.random()*640,length:5+Math.random()*10,speed:2+Math.random()*3});
}

// Key controls
document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") player.dx=-7;
 if(e.key==="ArrowRight") player.dx=7;
 if(e.key==="Shift") useNitro();
});
document.addEventListener("keyup",e=>{
 if(e.key==="ArrowLeft"||e.key==="ArrowRight") player.dx=0;
});

// Mobile buttons
function moveLeft(){player.dx=-7;setTimeout(()=>player.dx=0,120);}
function moveRight(){player.dx=7;setTimeout(()=>player.dx=0,120);}
function useNitro(){if(nitro>0){speed=10;nitro-=10;}}

// Nitro automatisch bijvullen
setInterval(()=>{if(!gameOver && nitro<maxNitro){nitro+=5;if(nitro>maxNitro) nitro=maxNitro;}},10000);

// Spawn vijanden
function spawnEnemy(){let lane=Math.floor(Math.random()*3);enemies.push({x:80+lane*110,y:-80});}
setInterval(spawnEnemy,1200);

// Spawn politie
function spawnPolice(){let lane=Math.floor(Math.random()*3);police.push({x:80+lane*110,y:-120});}
setInterval(spawnPolice,6000);

// Functies tekenen
function drawRoad(){
 ctx.fillStyle="#111"; ctx.fillRect(0,0,420,640);
 ctx.fillStyle="white";
 road.forEach(line=>{ctx.fillRect(line.x,line.y,10,40);line.y+=speed;if(line.y>640)line.y=-40;});
}

function drawRain(){
 ctx.strokeStyle="aqua";
 ctx.lineWidth=1;
 rainDrops.forEach(drop=>{
  ctx.beginPath();
  ctx.moveTo(drop.x,drop.y);
  ctx.lineTo(drop.x,drop.y+drop.length);
  ctx.stroke();
  drop.y+=drop.speed;
  if(drop.y>640) drop.y=-10;
 });
}

function drawCar(x,y,color){
 ctx.fillStyle=color; ctx.fillRect(x+6,y,28,70);
 ctx.fillStyle="#111"; ctx.fillRect(x+10,y+8,20,15); ctx.fillRect(x+10,y+45,20,15);
 ctx.fillStyle="black"; ctx.fillRect(x,y+10,6,15); ctx.fillRect(x+34,y+10,6,15); ctx.fillRect(x,y+45,6,15); ctx.fillRect(x+34,y+45,6,15);
}

function collide(a,b){return(a.x<b.x+40 && a.x+40>b.x && a.y<b.y+70 && a.y+70>b.y);}

function update(){
 player.x+=player.dx;
 if(player.x<50)player.x=50;
 if(player.x>330)player.x=330;
 if(speed>4)speed-=0.05;
}

function drawPlayer(){drawCar(player.x,player.y,"deepskyblue");}
function drawEnemies(){enemies.forEach((car,i)=>{car.y+=speed+2;drawCar(car.x,car.y,"red");if(car.y>700){enemies.splice(i,1);score++;if(score%10===0){level++;speed+=1;}}if(collide(player,car))gameOver=true;});}
function drawPolice(){police.forEach((car,i)=>{car.y+=speed+4;drawCar(car.x,car.y,"black");if(car.y>700)police.splice(i,1);if(collide(player,car))gameOver=true;});}
function drawHUD(){document.getElementById("score").textContent=score;document.getElementById("level").textContent=level;document.getElementById("speed").textContent=Math.floor(speed*20);document.getElementById("nitro").textContent=Math.max(0,Math.floor(nitro));}
function drawGameOver(){ctx.fillStyle="black";ctx.fillRect(0,0,420,640);ctx.fillStyle="white";ctx.font="40px Arial";ctx.fillText("Game Over",120,300);ctx.font="20px Arial";ctx.fillText("Score: "+score,170,340);}

// Game loop
function loop(){
 if(gameOver){drawGameOver();return;}
 update();
 drawRoad();
 drawRain();
 drawPlayer();
 drawEnemies();
 drawPolice();
 drawHUD();
 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
